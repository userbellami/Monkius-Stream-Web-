<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>Monkius Full Stream — Best Streaming Platform</title>
  <!-- Firebase SDK (without Storage – removed avatar upload) -->
  <script src="https://www.gstatic.com/firebasejs/9.22.2/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.22.2/firebase-auth-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.22.2/firebase-firestore-compat.js"></script>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700;800;900&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: 'Inter', sans-serif;
      background: #000;
      color: white;
      overflow-x: hidden;
    }
    /* Advanced animated background */
    #bg-canvas {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      z-index: 0;
      pointer-events: none;
    }
    .main-content {
      position: relative;
      z-index: 2;
      min-height: 100vh;
      background: linear-gradient(180deg, rgba(0,0,0,0.6) 0%, rgba(0,0,0,0.9) 100%);
    }
    /* Netflix-style navbar */
    .navbar {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 1rem 4%;
      background: linear-gradient(180deg, rgba(0,0,0,0.95) 0%, rgba(0,0,0,0.6) 100%);
      backdrop-filter: blur(8px);
      position: sticky;
      top: 0;
      z-index: 100;
    }
    .logo {
      font-size: 1.8rem;
      font-weight: 900;
      background: linear-gradient(135deg, #E50914, #ff4d4d);
      -webkit-background-clip: text;
      background-clip: text;
      color: transparent;
    }
    .nav-links {
      display: flex;
      gap: 2rem;
      align-items: center;
    }
    .nav-links a {
      color: #e5e5e5;
      text-decoration: none;
      font-weight: 500;
      font-size: 0.9rem;
      transition: 0.2s;
      cursor: pointer;
    }
    .nav-links a:hover, .nav-links a.active { color: #fff; }
    .nav-right {
      display: flex;
      align-items: center;
      gap: 1.5rem;
    }
    .search-icon {
      font-size: 1.2rem;
      cursor: pointer;
      color: #e5e5e5;
    }
    .search-icon:hover { color: #E50914; }
    /* Profile dropdown (without avatar upload) */
    .profile-dropdown {
      position: relative;
      display: inline-block;
    }
    .profile-btn {
      background: transparent;
      border: none;
      cursor: pointer;
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 6px 12px;
      border-radius: 30px;
      transition: 0.2s;
      color: white;
    }
    .profile-btn:hover { background: rgba(255,255,255,0.1); }
    .profile-btn i { font-size: 1.4rem; color: #E50914; }
    .dropdown-content {
      display: none;
      position: absolute;
      top: 45px;
      right: 0;
      background: rgba(0,0,0,0.95);
      backdrop-filter: blur(10px);
      min-width: 220px;
      border-radius: 8px;
      box-shadow: 0 8px 16px rgba(0,0,0,0.5);
      z-index: 200;
      border: 1px solid #333;
      padding: 1rem;
    }
    .profile-dropdown:hover .dropdown-content { display: block; }
    .dropdown-content input {
      width: 100%;
      padding: 8px;
      margin: 8px 0;
      background: #222;
      border: 1px solid #444;
      border-radius: 4px;
      color: white;
    }
    .dropdown-content button {
      background: #E50914;
      border: none;
      padding: 8px;
      width: 100%;
      border-radius: 4px;
      color: white;
      cursor: pointer;
      margin-top: 8px;
    }
    /* Landing Page (Netflix style with email form) */
    .landing-page {
      display: flex;
      flex-direction: column;
    }
    .hero-landing {
      min-height: 85vh;
      display: flex;
      align-items: center;
      justify-content: center;
      text-align: center;
      background: radial-gradient(ellipse at 30% 40%, rgba(0,0,0,0.3), rgba(0,0,0,0.85));
      padding: 2rem;
    }
    .hero-content-landing {
      max-width: 700px;
    }
    .hero-content-landing h1 {
      font-size: 3.2rem;
      font-weight: 800;
      margin-bottom: 1rem;
    }
    .hero-content-landing p {
      font-size: 1.3rem;
      margin-bottom: 1.5rem;
    }
    .email-form {
      display: flex;
      flex-wrap: wrap;
      justify-content: center;
      gap: 0.5rem;
      margin-top: 1rem;
    }
    .email-form input {
      padding: 1rem;
      width: 350px;
      font-size: 1rem;
      border: none;
      border-radius: 4px;
      background: rgba(255,255,255,0.2);
      color: white;
    }
    .email-form input::placeholder { color: #ddd; }
    .email-form button {
      background: #E50914;
      border: none;
      padding: 1rem 2rem;
      font-size: 1rem;
      font-weight: 600;
      border-radius: 4px;
      color: white;
      cursor: pointer;
    }
    .signin-panel, .signup-panel {
      background: rgba(0,0,0,0.85);
      padding: 2rem;
      border-radius: 8px;
      max-width: 450px;
      margin: 2rem auto;
    }
    .signin-panel h2, .signup-panel h2 { margin-bottom: 1rem; }
    .signin-panel input, .signup-panel input {
      width: 100%;
      padding: 1rem;
      margin: 0.5rem 0;
      background: #333;
      border: none;
      border-radius: 4px;
      color: white;
    }
    .toggle-auth { text-align: center; margin-top: 1rem; color: #aaa; cursor: pointer; }
    .toggle-auth span { color: #E50914; }
    /* Main App (logged in) */
    .app-container { display: none; }
    .hero-app {
      padding: 4rem 4% 6rem;
      min-height: 70vh;
      background: linear-gradient(90deg, #03060c 0%, transparent 70%);
    }
    .hero-app-content { max-width: 550px; }
    .hero-badge {
      background: rgba(229,9,20,0.9);
      display: inline-block;
      padding: 0.2rem 1rem;
      border-radius: 30px;
      font-size: 0.8rem;
    }
    .hero-app h1 { font-size: 3rem; margin: 1rem 0; }
    .category-section {
      margin: 2.5rem 0 3rem 0;
      padding-left: 4%;
    }
    .category-header {
      display: flex;
      justify-content: space-between;
      align-items: baseline;
      padding-right: 4%;
      margin-bottom: 1rem;
    }
    .category-header h2 { font-size: 1.5rem; font-weight: 700; }
    .movie-row {
      display: flex;
      gap: 1rem;
      overflow-x: auto;
      scroll-behavior: smooth;
      padding-bottom: 1rem;
      scrollbar-width: thin;
    }
    .movie-row::-webkit-scrollbar { height: 6px; }
    .movie-row::-webkit-scrollbar-track { background: #222; border-radius: 8px; }
    .movie-row::-webkit-scrollbar-thumb { background: #E50914; border-radius: 8px; }
    .movie-card {
      flex: 0 0 auto;
      width: 200px;
      border-radius: 8px;
      overflow: hidden;
      background: #111;
      transition: transform 0.3s, box-shadow 0.3s;
      cursor: pointer;
    }
    .movie-card:hover {
      transform: scale(1.05);
      box-shadow: 0 10px 20px rgba(0,0,0,0.5);
    }
    .movie-poster { width: 100%; height: 280px; object-fit: cover; }
    .movie-info { padding: 0.6rem; }
    .movie-title { font-size: 0.9rem; font-weight: 600; margin-bottom: 0.3rem; }
    .movie-year { font-size: 0.7rem; color: #aaa; }
    .search-overlay {
      position: fixed;
      top: 70px;
      left: 0;
      width: 100%;
      background: #0a0a0a;
      z-index: 200;
      padding: 1rem;
      display: none;
      border-bottom: 2px solid #E50914;
    }
    .search-overlay input {
      width: 80%;
      padding: 12px;
      font-size: 1rem;
      border: none;
      border-radius: 30px;
      margin-right: 10px;
    }
    .search-overlay button {
      background: #E50914;
      border: none;
      padding: 12px 24px;
      border-radius: 30px;
      color: white;
      cursor: pointer;
    }
    .search-results {
      display: flex;
      flex-wrap: wrap;
      gap: 1rem;
      margin-top: 1rem;
      max-height: 400px;
      overflow-y: auto;
      justify-content: center;
    }
    .modal {
      display: none;
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: rgba(0,0,0,0.95);
      z-index: 1000;
      justify-content: center;
      align-items: center;
    }
    .modal-content {
      background: #111;
      width: 90%;
      max-width: 1100px;
      border-radius: 12px;
      overflow: hidden;
    }
    .modal-video { width: 100%; height: 550px; border: none; }
    .modal-info { padding: 1.5rem; }
    .close-modal { float: right; font-size: 2rem; cursor: pointer; }
    .footer { text-align: center; padding: 2rem; color: #8a8a8a; font-size: 0.8rem; }
    @media (max-width: 768px) {
      .movie-card { width: 140px; }
      .movie-poster { height: 200px; }
      .hero-app h1 { font-size: 2rem; }
      .hero-content-landing h1 { font-size: 2rem; }
      .modal-video { height: 250px; }
      .email-form input { width: 100%; }
    }
  </style>
</head>
<body>
<canvas id="bg-canvas"></canvas>
<div class="main-content">
  <div class="navbar">
    <div class="logo">MONKIUS FULL STREAM</div>
    <div class="nav-links" id="nav-links-auth">
      <a class="active" data-nav="home">Home</a>
    </div>
    <div class="nav-right">
      <i class="fas fa-search search-icon" id="search-icon"></i>
      <div id="auth-section"></div>
    </div>
  </div>

  <!-- Landing Page (Netflix style with email form) -->
  <div id="landing-page" class="landing-page">
    <div class="hero-landing">
      <div class="hero-content-landing">
        <h1>Unlimited movies, TV shows, and more</h1>
        <p>Starts at Ksh 150. Cancel anytime.</p>
        <div class="email-form">
          <input type="email" id="landing-email" placeholder="Email address">
          <button id="get-started-btn">Get Started &nbsp; ></button>
        </div>
      </div>
    </div>
    <div id="signin-panel" class="signin-panel" style="display: none;">
      <h2>Sign In</h2>
      <input type="email" id="signin-email" placeholder="Email">
      <input type="password" id="signin-password" placeholder="Password">
      <button id="signin-submit">Sign In</button>
      <div class="toggle-auth" id="toggle-signup">New to Monkius? <span>Sign up now</span>.</div>
    </div>
    <div id="signup-panel" class="signup-panel" style="display: none;">
      <h2>Sign Up</h2>
      <input type="email" id="signup-email" placeholder="Email">
      <input type="password" id="signup-password" placeholder="Password (min 6 chars)">
      <button id="signup-submit">Create Account</button>
      <div class="toggle-auth" id="toggle-login">Already have an account? <span>Sign In</span>.</div>
    </div>
    <!-- Trending teaser row (requires login) -->
    <div class="category-section">
      <div class="category-header"><h2>🔥 Trending Now</h2></div>
      <div class="movie-row" id="landing-trending-row"></div>
    </div>
  </div>

  <!-- Main App (logged in) -->
  <div id="app-container" class="app-container">
    <div id="search-overlay" class="search-overlay">
      <input type="text" id="search-input" placeholder="Search movies...">
      <button id="search-btn"><i class="fas fa-search"></i> Search</button>
      <div id="search-results" class="search-results"></div>
    </div>
    <div class="hero-app">
      <div class="hero-app-content">
        <div class="hero-badge">🎬 NOW STREAMING</div>
        <h1 id="featured-title">Loading...</h1>
        <p id="featured-desc"></p>
        <button class="auth-btn" id="watch-trailer-btn" style="background:white; color:black; border:none; padding:0.5rem 1.5rem; border-radius:4px; font-weight:600; margin-top:1rem;">▶ Watch Trailer</button>
      </div>
    </div>
    <div id="categories-container"></div>
    <div class="footer"><p>© 2026 Monkius Full Stream — The Best Streaming Experience</p></div>
  </div>
</div>

<!-- Modals -->
<div id="trailer-modal" class="modal"><div class="modal-content"><span class="close-modal">&times;</span><iframe id="trailer-iframe" class="modal-video" frameborder="0" allowfullscreen></iframe><div class="modal-info"><h3 id="modal-title"></h3><p id="modal-overview"></p></div></div></div>
<div id="stream-modal" class="modal"><div class="modal-content"><span class="close-modal">&times;</span><iframe id="stream-iframe" class="modal-video" allow="autoplay; fullscreen" frameborder="0" allowfullscreen></iframe><div class="modal-info"><h3 id="stream-title"></h3><p id="stream-desc"></p><button id="fallback-btn" style="background:#333; border:none; padding:8px; margin-top:10px; border-radius:4px; color:white; cursor:pointer;">🔄 Try Alternate Source</button></div></div></div>

<script>
  // Firebase config (no Storage needed for profile)
  const firebaseConfig = {
    apiKey: "AIzaSyB-9QzBOU6vFST4EvxdhFEIz5QBA1D-XW0",
    authDomain: "monkius-full-stream.firebaseapp.com",
    projectId: "monkius-full-stream",
    storageBucket: "monkius-full-stream.firebasestorage.app",
    messagingSenderId: "276409313367",
    appId: "1:276409313367:web:1eb2fb48df4feb9c801b12"
  };
  firebase.initializeApp(firebaseConfig);
  const auth = firebase.auth();
  const db = firebase.firestore();

  let currentUser = null;
  let featuredMovie = null;
  let currentMovie = null;
  let currentFallbacks = [];

  // DOM elements
  const landingPage = document.getElementById('landing-page');
  const appContainer = document.getElementById('app-container');
  const authSection = document.getElementById('auth-section');
  const categoriesContainer = document.getElementById('categories-container');
  const featuredTitle = document.getElementById('featured-title');
  const featuredDesc = document.getElementById('featured-desc');
  const watchTrailerBtn = document.getElementById('watch-trailer-btn');
  const searchIcon = document.getElementById('search-icon');
  const searchOverlay = document.getElementById('search-overlay');
  const searchInput = document.getElementById('search-input');
  const searchBtn = document.getElementById('search-btn');
  const searchResultsDiv = document.getElementById('search-results');
  const trailerModal = document.getElementById('trailer-modal');
  const streamModal = document.getElementById('stream-modal');
  const trailerIframe = document.getElementById('trailer-iframe');
  const streamIframe = document.getElementById('stream-iframe');
  const streamTitle = document.getElementById('stream-title');
  const streamDesc = document.getElementById('stream-desc');
  const fallbackBtn = document.getElementById('fallback-btn');

  // ----- Profile UI (no avatar upload, just name + logout) -----
  async function updateProfileUI() {
    if (!currentUser) return;
    const doc = await db.collection('users').doc(currentUser.uid).collection('profile').doc('info').get();
    const data = doc.exists ? doc.data() : {};
    const displayName = data.displayName || currentUser.email.split('@')[0];
    authSection.innerHTML = `
      <div class="profile-dropdown">
        <button class="profile-btn">
          <i class="fas fa-user-circle"></i>
          <span id="profile-name">${displayName}</span>
          <i class="fas fa-chevron-down"></i>
        </button>
        <div class="dropdown-content">
          <input type="text" id="display-name-input" placeholder="Display Name" value="${displayName}">
          <button id="save-name-btn">Save Name</button>
          <button id="logout-btn" class="secondary">Logout</button>
        </div>
      </div>
    `;
    document.getElementById('save-name-btn')?.addEventListener('click', async () => {
      const newName = document.getElementById('display-name-input').value.trim();
      if (newName) {
        await db.collection('users').doc(currentUser.uid).collection('profile').doc('info').set({ displayName: newName }, { merge: true });
        document.getElementById('profile-name').innerText = newName;
        alert('Name updated');
      }
    });
    document.getElementById('logout-btn')?.addEventListener('click', () => auth.signOut());
  }

  // ----- Landing page with email flow -----
  function showLanding() {
    landingPage.style.display = 'block';
    appContainer.style.display = 'none';
    authSection.innerHTML = '<button class="signin-btn-large" id="navbar-signin" style="padding:0.4rem 1rem; background:#E50914; border:none; border-radius:4px; color:white; cursor:pointer;">Sign In</button>';
    document.getElementById('navbar-signin')?.addEventListener('click', () => {
      document.getElementById('signin-panel').style.display = 'block';
      document.getElementById('signup-panel').style.display = 'none';
      landingPage.scrollIntoView({ behavior: 'smooth' });
    });
    loadLandingTrending();
  }

  function showApp() {
    landingPage.style.display = 'none';
    appContainer.style.display = 'block';
    updateProfileUI();
    loadCategories();
  }

  auth.onAuthStateChanged(user => {
    currentUser = user;
    if (user) showApp();
    else showLanding();
  });

  // Landing email button
  document.getElementById('get-started-btn')?.addEventListener('click', () => {
    const email = document.getElementById('landing-email').value.trim();
    if (!email) return;
    document.getElementById('signup-panel').style.display = 'block';
    document.getElementById('signin-panel').style.display = 'none';
    document.getElementById('signup-email').value = email;
    landingPage.scrollIntoView({ behavior: 'smooth' });
  });

  // Auth panels
  document.getElementById('signin-submit')?.addEventListener('click', () => {
    const email = document.getElementById('signin-email').value;
    const pwd = document.getElementById('signin-password').value;
    auth.signInWithEmailAndPassword(email, pwd).catch(e => alert(e.message));
  });
  document.getElementById('signup-submit')?.addEventListener('click', () => {
    const email = document.getElementById('signup-email').value;
    const pwd = document.getElementById('signup-password').value;
    auth.createUserWithEmailAndPassword(email, pwd).then(() => {
      db.collection('users').doc(auth.currentUser.uid).collection('profile').doc('info').set({ displayName: email.split('@')[0] });
    }).catch(e => alert(e.message));
  });
  document.getElementById('toggle-signup')?.addEventListener('click', () => {
    document.getElementById('signin-panel').style.display = 'none';
    document.getElementById('signup-panel').style.display = 'block';
  });
  document.getElementById('toggle-login')?.addEventListener('click', () => {
    document.getElementById('signup-panel').style.display = 'none';
    document.getElementById('signin-panel').style.display = 'block';
  });

  // Load landing trending (teaser)
  async function loadLandingTrending() {
    const res = await fetch('/api/movies/trending');
    const movies = await res.json();
    const row = document.getElementById('landing-trending-row');
    row.innerHTML = '';
    movies.slice(0, 10).forEach(m => {
      const card = document.createElement('div');
      card.className = 'movie-card';
      card.innerHTML = `
        <img class="movie-poster" src="https://image.tmdb.org/t/p/w300${m.poster_path}">
        <div class="movie-info">
          <div class="movie-title">${m.title}</div>
          <button class="small-btn" style="background:#E50914; margin-top:5px; padding:4px 8px; border:none; border-radius:4px; color:white;">Sign in to watch</button>
        </div>
      `;
      card.querySelector('button').onclick = () => {
        document.getElementById('signin-panel').style.display = 'block';
        document.getElementById('signup-panel').style.display = 'none';
      };
      row.appendChild(card);
    });
  }

  // ----- Main app categories (Netflix style) -----
  const categories = [
    { title: '🔥 Trending Now', api: 'trending' },
    { title: '🏆 Top Rated', api: 'top_rated' },
    { title: '💥 Action', api: 'action' },
    { title: '😂 Comedy', api: 'comedy' },
    { title: '🚀 Sci-Fi', api: 'scifi' },
    { title: '💖 Romance', api: 'romance' }
  ];

  async function fetchMovies(category) {
    const res = await fetch(`/api/movies/${category}`);
    return await res.json();
  }

  async function loadCategories() {
    categoriesContainer.innerHTML = '';
    for (let cat of categories) {
      const movies = await fetchMovies(cat.api);
      if (!movies || movies.length === 0) continue;
      const section = document.createElement('div');
      section.className = 'category-section';
      section.innerHTML = `<div class="category-header"><h2>${cat.title}</h2></div><div class="movie-row" id="row-${cat.api}"></div>`;
      const rowDiv = section.querySelector('.movie-row');
      movies.slice(0, 12).forEach(movie => {
        const card = createMovieCard(movie);
        rowDiv.appendChild(card);
      });
      categoriesContainer.appendChild(section);
      if (cat.api === 'trending' && movies[0]) {
        featuredMovie = movies[0];
        featuredTitle.innerText = featuredMovie.title;
        featuredDesc.innerText = featuredMovie.overview ? featuredMovie.overview.slice(0, 150) + '...' : '';
      }
    }
  }

  function createMovieCard(movie) {
    const card = document.createElement('div');
    card.className = 'movie-card';
    card.innerHTML = `
      <img class="movie-poster" src="https://image.tmdb.org/t/p/w500${movie.poster_path}" alt="${movie.title}">
      <div class="movie-info">
        <div class="movie-title">${movie.title}</div>
        <div class="movie-year">${new Date(movie.release_date).getFullYear() || '2024'}</div>
        <div class="movie-actions" style="display:flex; gap:5px; margin-top:8px;">
          <button class="small-btn watch" style="background:#E50914;">▶ Watch</button>
          <button class="small-btn trailer">🎬 Trailer</button>
        </div>
      </div>
    `;
    card.querySelector('.watch').onclick = (e) => {
      e.stopPropagation();
      playFullMovie(movie);
    };
    card.querySelector('.trailer').onclick = (e) => {
      e.stopPropagation();
      openTrailer(movie.id, movie.title, movie.overview);
    };
    return card;
  }

  // ----- Streaming with fallback -----
  async function playFullMovie(movie) {
    currentMovie = movie;
    streamTitle.innerText = movie.title;
    streamDesc.innerText = movie.overview || '';
    const res = await fetch(`/api/stream/${movie.id}`);
    const data = await res.json();
    currentStreamUrl = data.url;
    currentFallbacks = data.fallbacks || [];
    streamIframe.src = currentStreamUrl;
    streamModal.style.display = 'flex';
  }

  fallbackBtn.onclick = () => {
    if (currentFallbacks.length > 0) {
      currentStreamUrl = currentFallbacks.shift();
      streamIframe.src = currentStreamUrl;
    } else {
      alert('No more fallback sources.');
    }
  };

  async function openTrailer(id, title, overview) {
    const res = await fetch(`/api/movie/${id}/trailer`);
    const data = await res.json();
    if (data.key) {
      trailerIframe.src = `https://www.youtube.com/embed/${data.key}?autoplay=1`;
      document.getElementById('modal-title').innerText = title;
      document.getElementById('modal-overview').innerText = overview || '';
      trailerModal.style.display = 'flex';
    } else alert('No trailer');
  }

  watchTrailerBtn.onclick = () => {
    if (featuredMovie) openTrailer(featuredMovie.id, featuredMovie.title, featuredMovie.overview);
  };

  // Search
  searchIcon.onclick = () => {
    searchOverlay.style.display = searchOverlay.style.display === 'block' ? 'none' : 'block';
    if (searchOverlay.style.display === 'block') searchInput.focus();
  };
  async function performSearch() {
    const query = searchInput.value.trim();
    if (!query) return;
    const res = await fetch(`/api/search?q=${encodeURIComponent(query)}`);
    const movies = await res.json();
    searchResultsDiv.innerHTML = '';
    if (movies.length === 0) {
      searchResultsDiv.innerHTML = '<p>No movies found</p>';
      return;
    }
    movies.slice(0, 12).forEach(m => {
      const card = createMovieCard(m);
      card.style.width = '150px';
      searchResultsDiv.appendChild(card);
    });
  }
  searchBtn.onclick = performSearch;
  searchInput.addEventListener('keypress', e => { if (e.key === 'Enter') performSearch(); });

  // Close modals
  document.querySelectorAll('.close-modal').forEach(btn => {
    btn.onclick = () => {
      trailerModal.style.display = 'none';
      streamModal.style.display = 'none';
      trailerIframe.src = '';
      streamIframe.src = '';
    };
  });
  window.onclick = (e) => {
    if (e.target === trailerModal) { trailerModal.style.display = 'none'; trailerIframe.src = ''; }
    if (e.target === streamModal) { streamModal.style.display = 'none'; streamIframe.src = ''; }
  };

  // Advanced animated background (mouse-interactive particles)
  const canvas = document.getElementById('bg-canvas');
  let ctx = canvas.getContext('2d');
  let w = window.innerWidth, h = window.innerHeight;
  let particles = [];
  let mouseX = w/2, mouseY = h/2;
  document.addEventListener('mousemove', (e) => { mouseX = e.clientX; mouseY = e.clientY; });
  class Particle {
    constructor() {
      this.x = Math.random() * w;
      this.y = Math.random() * h;
      this.vx = (Math.random() - 0.5) * 0.6;
      this.vy = (Math.random() - 0.5) * 0.6;
      this.size = Math.random() * 2.5 + 1;
      this.hue = 350 + Math.random() * 20;
      this.alpha = Math.random() * 0.4 + 0.1;
    }
    update() {
      let dx = mouseX - this.x, dy = mouseY - this.y;
      let dist = Math.hypot(dx, dy);
      if (dist < 150) {
        let angle = Math.atan2(dy, dx);
        let force = (150 - dist) / 150 * 0.3;
        this.vx += Math.cos(angle) * force;
        this.vy += Math.sin(angle) * force;
      }
      this.vx *= 0.99;
      this.vy *= 0.99;
      this.x += this.vx;
      this.y += this.vy;
      if (this.x < 0) this.x = w;
      if (this.x > w) this.x = 0;
      if (this.y < 0) this.y = h;
      if (this.y > h) this.y = 0;
    }
    draw() {
      ctx.beginPath();
      ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2);
      ctx.fillStyle = `hsla(${this.hue}, 80%, 55%, ${this.alpha})`;
      ctx.fill();
    }
  }
  function initParticles() { particles = []; for (let i = 0; i < 150; i++) particles.push(new Particle()); }
  function drawConnections() {
    for (let i = 0; i < particles.length; i++) {
      for (let j = i + 1; j < particles.length; j++) {
        let dx = particles[i].x - particles[j].x;
        let dy = particles[i].y - particles[j].y;
        let dist = Math.hypot(dx, dy);
        if (dist < 100) {
          ctx.beginPath();
          ctx.moveTo(particles[i].x, particles[i].y);
          ctx.lineTo(particles[j].x, particles[j].y);
          ctx.strokeStyle = `rgba(229, 9, 20, ${(1 - dist / 100) * 0.2})`;
          ctx.lineWidth = 0.6;
          ctx.stroke();
        }
      }
    }
  }
  let time = 0;
  function animateBg() {
    ctx.clearRect(0, 0, w, h);
    time += 0.003;
    const grad = ctx.createLinearGradient(w/2 + Math.sin(time)*80, h/2 + Math.cos(time*0.8)*80, w/2 - Math.sin(time*1.2)*80, h/2 - Math.cos(time*0.6)*80);
    grad.addColorStop(0, '#0a0a1a');
    grad.addColorStop(0.5, '#1a0a16');
    grad.addColorStop(1, '#050510');
    ctx.fillStyle = grad;
    ctx.fillRect(0, 0, w, h);
    particles.forEach(p => { p.update(); p.draw(); });
    drawConnections();
    requestAnimationFrame(animateBg);
  }
  function resizeCanvas() { w = window.innerWidth; h = window.innerHeight; canvas.width = w; canvas.height = h; initParticles(); }
  window.addEventListener('resize', resizeCanvas);
  resizeCanvas();
  initParticles();
  animateBg();
</script>
</body>
</html>
