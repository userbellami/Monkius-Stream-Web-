<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Monkius Full Stream — Watch Free</title>
  <script src="https://www.gstatic.com/firebasejs/9.22.2/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.22.2/firebase-auth-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.22.2/firebase-firestore-compat.js"></script>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: 'Inter', sans-serif; background: #0b0b0b; color: white; overflow-x: hidden; }
    #bg-canvas { position: fixed; top: 0; left: 0; width: 100%; height: 100%; z-index: 0; pointer-events: none; background: radial-gradient(circle at 20% 30%, #0a0f1a, #03060c); }
    .main-content { position: relative; z-index: 2; background: linear-gradient(180deg, rgba(0,0,0,0.55) 0%, rgba(0,0,0,0.82) 100%); min-height: 100vh; }
    .navbar { display: flex; justify-content: space-between; align-items: center; padding: 1.2rem 4%; background: linear-gradient(180deg, rgba(0,0,0,0.85) 0%, rgba(0,0,0,0.4) 100%); backdrop-filter: blur(6px); position: sticky; top: 0; z-index: 100; flex-wrap: wrap; gap: 1rem; }
    .logo { font-size: 1.8rem; font-weight: 800; background: linear-gradient(135deg, #E50914, #ff6b6b); -webkit-background-clip: text; background-clip: text; color: transparent; }
    .nav-links { display: flex; gap: 2rem; align-items: center; }
    .nav-links a { color: #e5e5e5; text-decoration: none; font-weight: 500; cursor: pointer; }
    .nav-links a:hover, .nav-links a.active { color: #fff; }
    .nav-icons { display: flex; gap: 1.2rem; align-items: center; }
    .nav-icons i { font-size: 1.2rem; cursor: pointer; color: #e5e5e5; transition: 0.2s; }
    .nav-icons i:hover { color: #E50914; }
    .auth-buttons, .user-greeting { display: flex; gap: 1rem; align-items: center; }
    .auth-btn { background: #E50914; border: none; padding: 0.4rem 1rem; border-radius: 4px; color: white; cursor: pointer; font-weight: 600; }
    .hero { padding: 4rem 4% 6rem; min-height: 70vh; display: flex; align-items: center; background: linear-gradient(90deg, #03060c 0%, transparent 70%); }
    .hero-content { max-width: 550px; }
    .hero-badge { background: rgba(229,9,20,0.9); display: inline-block; padding: 0.2rem 1rem; border-radius: 30px; font-size: 0.8rem; margin-bottom: 1rem; }
    .hero-content h1 { font-size: 3rem; margin-bottom: 1rem; }
    .row-section { margin: 2.5rem 0 3rem 0; padding-left: 4%; }
    .row-header { display: flex; justify-content: space-between; align-items: baseline; padding-right: 4%; margin-bottom: 1rem; }
    .movie-row { display: flex; gap: 1rem; overflow-x: auto; scroll-behavior: smooth; padding-bottom: 1rem; }
    .movie-card { flex: 0 0 auto; width: 190px; border-radius: 12px; overflow: hidden; background: #111; cursor: pointer; transition: transform 0.2s; }
    .movie-card:hover { transform: scale(1.05); }
    .movie-poster { width: 100%; height: 270px; object-fit: cover; }
    .movie-info { padding: 0.6rem; }
    .movie-title { font-size: 0.85rem; font-weight: 600; }
    .movie-actions { display: flex; gap: 5px; margin-top: 8px; flex-wrap: wrap; }
    .small-btn { background: #333; border: none; padding: 4px 8px; border-radius: 4px; color: white; font-size: 0.7rem; cursor: pointer; font-weight: 600; }
    .small-btn.watch { background: #E50914; }
    .modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.95); z-index: 1000; justify-content: center; align-items: center; }
    .modal-content { background: #111; width: 90%; max-width: 1000px; border-radius: 12px; overflow: hidden; }
    .modal-video { width: 100%; height: 500px; background: black; border: none; }
    .modal-info { padding: 1.5rem; }
    .close-modal { float: right; font-size: 2rem; cursor: pointer; color: white; }
    .search-overlay { position: fixed; top: 70px; left: 0; width: 100%; background: #0a0a0a; z-index: 200; padding: 1rem; display: none; border-bottom: 2px solid #E50914; }
    .search-overlay input { width: 80%; padding: 12px; font-size: 1rem; border: none; border-radius: 30px; margin-right: 10px; }
    .search-overlay button { background: #E50914; border: none; padding: 12px 24px; border-radius: 30px; color: white; cursor: pointer; }
    .search-results { display: flex; flex-wrap: wrap; gap: 1rem; margin-top: 1rem; max-height: 400px; overflow-y: auto; justify-content: center; }
    .refresh-bar { display: flex; justify-content: space-between; align-items: center; padding: 0 4%; margin-top: 1rem; }
    .live-badge { background: #E50914; padding: 4px 12px; border-radius: 20px; font-size: 0.8rem; }
    .refresh-btn { background: transparent; border: 1px solid #E50914; color: white; padding: 6px 12px; border-radius: 20px; cursor: pointer; }
    .footer { text-align: center; padding: 2rem; color: #8a8a8a; }
    @media (max-width: 768px) { .movie-card { width: 140px; } .movie-poster { height: 200px; } .nav-links { display: none; } .hero-content h1 { font-size: 2rem; } .modal-video { height: 250px; } }
  </style>
</head>
<body>
<canvas id="bg-canvas"></canvas>
<div class="main-content">
  <div class="navbar">
    <div class="logo">MONKIUS FULL STREAM</div>
    <div class="nav-links"><a class="active" data-nav="home">Home</a><a data-nav="mylist">My List</a></div>
    <div style="display: flex; gap: 1rem; align-items: center;">
      <div class="nav-icons"><i class="fas fa-search" id="search-icon"></i></div>
      <div id="auth-section"></div>
    </div>
  </div>
  <div id="search-overlay" class="search-overlay">
    <input type="text" id="search-input" placeholder="Search movies...">
    <button id="search-btn"><i class="fas fa-search"></i> Search</button>
    <div id="search-results" class="search-results"></div>
  </div>
  <div class="refresh-bar">
    <div><span class="live-badge">🔥 LIVE</span><span style="margin-left:10px;font-size:0.8rem;">Content updates daily</span></div>
    <button id="refresh-data-btn" class="refresh-btn"><i class="fas fa-sync-alt"></i> Refresh</button>
  </div>
  <div class="hero"><div class="hero-content"><div class="hero-badge">🎬 WATCH FULL MOVIES</div><h1 id="featured-title">Loading...</h1><p id="featured-desc"></p><button class="auth-btn" id="watch-trailer-btn" style="background:white;color:black;">▶ Trailer</button></div></div>
  <div id="rows-container"></div>
  <div class="footer"><p>© 2026 Monkius Full Stream — Stream instantly, no redirects.</p></div>
</div>
<div id="trailer-modal" class="modal"><div class="modal-content"><span class="close-modal">&times;</span><iframe id="trailer-iframe" class="modal-video" frameborder="0" allowfullscreen></iframe><div class="modal-info"><h3 id="modal-title"></h3><p id="modal-overview"></p></div></div></div>
<div id="stream-modal" class="modal"><div class="modal-content"><span class="close-modal">&times;</span><iframe id="stream-iframe" class="modal-video" sandbox="allow-same-origin allow-scripts allow-popups allow-forms allow-popups-to-escape-sandbox" allow="autoplay; fullscreen" frameborder="0" allowfullscreen></iframe><div class="modal-info"><h3 id="stream-title"></h3><p id="stream-desc"></p></div></div></div>
<script>
  const firebaseConfig = { apiKey: "AIzaSyB-9QzBOU6vFST4EvxdhFEIz5QBA1D-XW0", authDomain: "monkius-full-stream.firebaseapp.com", projectId: "monkius-full-stream", storageBucket: "monkius-full-stream.firebasestorage.app", messagingSenderId: "276409313367", appId: "1:276409313367:web:1eb2fb48df4feb9c801b12" };
  firebase.initializeApp(firebaseConfig);
  const auth = firebase.auth(), db = firebase.firestore();
  let currentUser = null, myList = new Set();
  const authSection = document.getElementById('auth-section'), rowsContainer = document.getElementById('rows-container'), trailerModal = document.getElementById('trailer-modal'), streamModal = document.getElementById('stream-modal'), trailerIframe = document.getElementById('trailer-iframe'), streamIframe = document.getElementById('stream-iframe'), streamTitle = document.getElementById('stream-title'), streamDesc = document.getElementById('stream-desc'), watchTrailerBtn = document.getElementById('watch-trailer-btn'), searchIcon = document.getElementById('search-icon'), searchOverlay = document.getElementById('search-overlay'), searchInput = document.getElementById('search-input'), searchBtn = document.getElementById('search-btn'), searchResultsDiv = document.getElementById('search-results');
  let featuredMovie = null;
  searchIcon.onclick = () => { searchOverlay.style.display = searchOverlay.style.display === 'block' ? 'none' : 'block'; if(searchOverlay.style.display === 'block') searchInput.focus(); };
  async function performSearch() { const query = searchInput.value.trim(); if(!query) return; const res = await fetch(`/api/search?q=${encodeURIComponent(query)}`); const movies = await res.json(); searchResultsDiv.innerHTML = ''; if(movies.length===0){ searchResultsDiv.innerHTML='<p>No movies found</p>'; return; } movies.slice(0,12).forEach(m=>{ const card = document.createElement('div'); card.className='movie-card'; card.style.width='150px'; card.innerHTML=`<img class="movie-poster" src="https://image.tmdb.org/t/p/w200${m.poster_path}" style="height:225px;"><div class="movie-info"><div class="movie-title">${m.title}</div><div class="movie-actions"><button class="small-btn watch" data-movie='${JSON.stringify(m)}'>▶ Watch</button><button class="small-btn" data-movie-id="${m.id}" data-movie-title="${m.title}" data-movie-poster="${m.poster_path}" data-movie-overview="${m.overview}">➕ My List</button></div></div>`; card.querySelector('.watch').onclick = () => playFullMovie(m); card.querySelector('.small-btn:not(.watch)').onclick = () => addToMyList(m.id, {title:m.title, poster_path:m.poster_path, overview:m.overview}); searchResultsDiv.appendChild(card); }); }
  searchBtn.onclick = performSearch; searchInput.addEventListener('keypress', e => { if(e.key === 'Enter') performSearch(); });
  async function getStreamingUrl(movieId){ const res = await fetch(`/api/stream/movie/${movieId}`); const data = await res.json(); return data.url; }
  async function playFullMovie(movie){ streamTitle.innerText = movie.title; streamDesc.innerText = movie.overview || ''; const url = await getStreamingUrl(movie.id); if(url){ streamIframe.src = ''; streamIframe.src = url; streamModal.style.display = 'flex'; } else alert('Stream not available'); }
  function updateAuthUI(){ if(currentUser){ authSection.innerHTML = `<div class="user-greeting"><span>👤 ${currentUser.email}</span><button class="auth-btn" id="logout-btn">Logout</button></div>`; document.getElementById('logout-btn').onclick = () => auth.signOut(); loadMyList(); } else { authSection.innerHTML = `<div class="auth-buttons"><button class="auth-btn" id="login-btn">Login</button><button class="auth-btn" id="signup-btn">Sign Up</button></div>`; document.getElementById('login-btn').onclick = () => showAuthModal('login'); document.getElementById('signup-btn').onclick = () => showAuthModal('signup'); } }
  function showAuthModal(mode){ const email = prompt(mode==='login'?'Email:':'Email for signup:'); if(!email) return; const pwd = prompt('Password (min 6 chars):'); if(!pwd) return; if(mode==='signup') auth.createUserWithEmailAndPassword(email,pwd).catch(e=>alert(e.message)); else auth.signInWithEmailAndPassword(email,pwd).catch(e=>alert(e.message)); }
  auth.onAuthStateChanged(user => { currentUser = user; updateAuthUI(); });
  async function loadMyList(){ if(!currentUser) return; const snap = await db.collection('users').doc(currentUser.uid).collection('mylist').get(); myList.clear(); snap.forEach(d=>myList.add(d.id)); if(document.querySelector('[data-nav="mylist"].active')) renderMyListView(); }
  async function addToMyList(id,data){ if(!currentUser){ alert('Login first'); return; } await db.collection('users').doc(currentUser.uid).collection('mylist').doc(id.toString()).set(data); myList.add(id.toString()); alert('Added'); }
  async function removeFromMyList(id){ if(!currentUser) return; await db.collection('users').doc(currentUser.uid).collection('mylist').doc(id.toString()).delete(); myList.delete(id.toString()); alert('Removed'); if(document.querySelector('[data-nav="mylist"].active')) renderMyListView(); }
  function renderMovieCard(m, isMyList=false){ const card = document.createElement('div'); card.className='movie-card'; card.innerHTML=`<img class="movie-poster" src="https://image.tmdb.org/t/p/w500${m.poster_path}" onerror="this.src='https://placehold.co/300x450/1e1e2a/white?text=No+Image'"><div class="movie-info"><div class="movie-title">${m.title}</div><div class="movie-actions"><button class="small-btn watch" data-movie='${JSON.stringify(m)}'>▶ Watch</button><button class="small-btn" data-movie-id="${m.id}">${isMyList ? 'Remove' : '➕ My List'}</button><button class="small-btn" data-trailer-id="${m.id}">🎬 Trailer</button></div></div>`; card.querySelector('.watch').onclick = e => { e.stopPropagation(); playFullMovie(m); }; const listBtn = card.querySelector('.small-btn:nth-child(2)'); listBtn.onclick = e => { e.stopPropagation(); if(isMyList) removeFromMyList(m.id); else addToMyList(m.id, {title:m.title, poster_path:m.poster_path, overview:m.overview}); }; card.querySelector('[data-trailer-id]').onclick = e => { e.stopPropagation(); openTrailer(m.id, m.title, m.overview); }; return card; }
  async function openTrailer(id, title, overview){ const res = await fetch(`/api/movie/${id}/trailer`); const data = await res.json(); if(data.key){ trailerIframe.src = `https://www.youtube.com/embed/${data.key}?autoplay=1`; document.getElementById('modal-title').innerText = title; document.getElementById('modal-overview').innerText = overview || ''; trailerModal.style.display = 'flex'; } else alert('No trailer'); }
  async function fetchMovies(cat){ const res = await fetch(`/api/movies/${cat}`); return await res.json(); }
  async function loadRows(){ const cats = [{title:'🔥 Trending Now', cat:'trending'},{title:'🏆 Top Rated', cat:'top_rated'},{title:'💥 Action', cat:'action'},{title:'😂 Comedy', cat:'comedy'}]; rowsContainer.innerHTML = ''; for(let c of cats){ const movies = await fetchMovies(c.cat); if(!movies || movies.length===0) continue; const rowDiv = document.createElement('div'); rowDiv.className='row-section'; rowDiv.innerHTML = `<div class="row-header"><h2>${c.title}</h2></div><div class="movie-row" id="row-${c.cat}"></div>`; const movieRow = rowDiv.querySelector('.movie-row'); movies.slice(0,12).forEach(m => movieRow.appendChild(renderMovieCard(m))); rowsContainer.appendChild(rowDiv); if(c.cat === 'trending' && movies[0]){ featuredMovie = movies[0]; document.getElementById('featured-title').innerText = featuredMovie.title; document.getElementById('featured-desc').innerText = featuredMovie.overview ? featuredMovie.overview.slice(0,150)+'...' : ''; } } }
  async function renderMyListView(){ if(!currentUser){ rowsContainer.innerHTML = '<div style="padding:2rem;text-align:center;">Please login</div>'; return; } const snap = await db.collection('users').doc(currentUser.uid).collection('mylist').get(); const myMovies = []; snap.forEach(d=>myMovies.push({id:d.id, ...d.data()})); rowsContainer.innerHTML = `<div class="row-section"><div class="row-header"><h2>📋 My List</h2></div><div class="movie-row" id="mylist-row"></div></div>`; const row = document.getElementById('mylist-row'); if(myMovies.length===0) row.innerHTML = '<p style="color:gray;">No movies yet</p>'; else myMovies.forEach(m=>{ const fake = {id:m.id, title:m.title, poster_path:m.poster_path, overview:m.overview}; row.appendChild(renderMovieCard(fake, true)); }); }
  document.querySelectorAll('[data-nav]').forEach(link => { link.addEventListener('click', () => { const nav = link.getAttribute('data-nav'); if(nav === 'home') loadRows(); else if(nav === 'mylist') renderMyListView(); document.querySelectorAll('[data-nav]').forEach(l => l.classList.remove('active')); link.classList.add('active'); searchOverlay.style.display = 'none'; }); });
  watchTrailerBtn.onclick = () => { if(featuredMovie) openTrailer(featuredMovie.id, featuredMovie.title, featuredMovie.overview); };
  document.querySelectorAll('.close-modal').forEach(btn => { btn.onclick = () => { trailerModal.style.display = 'none'; streamModal.style.display = 'none'; trailerIframe.src = ''; streamIframe.src = ''; }; });
  window.onclick = (e) => { if(e.target === trailerModal) { trailerModal.style.display = 'none'; trailerIframe.src = ''; } if(e.target === streamModal) { streamModal.style.display = 'none'; streamIframe.src = ''; } };
  document.getElementById('refresh-data-btn').onclick = async () => { const btn = document.getElementById('refresh-data-btn'); btn.innerHTML = '<i class="fas fa-spinner fa-spin"></i> Refreshing...'; btn.disabled = true; await loadRows(); btn.innerHTML = '<i class="fas fa-check"></i> Updated!'; setTimeout(() => { btn.innerHTML = '<i class="fas fa-sync-alt"></i> Refresh'; btn.disabled = false; }, 2000); };
  loadRows();
  // Background animation (simplified but works)
  const canvas = document.getElementById('bg-canvas'), ctx = canvas.getContext('2d');
  let w = window.innerWidth, h = window.innerHeight, particles = [];
  function resizeCanvas(){ w = window.innerWidth; h = window.innerHeight; canvas.width = w; canvas.height = h; initParticles(); }
  function initParticles(){ particles = []; for(let i=0;i<70;i++) particles.push({x:Math.random()*w, y:Math.random()*h, vx:(Math.random()-0.5)*0.35, vy:(Math.random()-0.5)*0.35, size:Math.random()*2.5+1, color:`rgba(229,9,20,${Math.random()*0.4+0.2})`}); }
  function draw(){ ctx.clearRect(0,0,w,h); const grad = ctx.createLinearGradient(Math.sin(Date.now()*0.001)*100,0,w-Math.cos(Date.now()*0.0007)*100,h); grad.addColorStop(0,'#03060c'); grad.addColorStop(0.5,'#121826'); grad.addColorStop(1,'#1a0e12'); ctx.fillStyle=grad; ctx.fillRect(0,0,w,h); particles.forEach(p=>{ p.x+=p.vx; p.y+=p.vy; if(p.x<0) p.x=w; if(p.x>w) p.x=0; if(p.y<0) p.y=h; if(p.y>h) p.y=0; ctx.beginPath(); ctx.arc(p.x,p.y,p.size,0,Math.PI*2); ctx.fillStyle=p.color; ctx.fill(); }); requestAnimationFrame(draw); }
  window.addEventListener('resize', resizeCanvas); resizeCanvas(); initParticles(); draw();
</script>
</body>
</html>
